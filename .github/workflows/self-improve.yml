name: LC&C Self-Improvement Loop

on:
  schedule:
    # Daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      agent_id:
        description: 'Agent to run self-improvement on'
        required: false
        default: 'lifelong-catch-correct'

concurrency:
  group: self-improve
  cancel-in-progress: false

jobs:
  self-improve:
    name: Run LC&C loop
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run self-improvement loop
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_CONTENT_TOKEN: ${{ secrets.CONTENT_REPO_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GMAOS_LOCAL_MODEL_ENABLED: 'false'
          AGENT_ID: ${{ inputs.agent_id || 'lifelong-catch-correct' }}
        run: |
          python -c "
          import os, time, hashlib, datetime
          from runtime.sovereign_core import SovereignAutomationCore
          from runtime.cycle_log import CycleLog, CycleRecord

          agent_id = os.environ.get('AGENT_ID', 'lifelong-catch-correct')
          core = SovereignAutomationCore()
          start = time.time()
          result = core.execute(
              system_declaration='Registry-governed LC&C self-improvement.',
              dynamic_context='',
              objective='Run LC&C self-improvement loop: analyze recent outputs, rewrite underperforming prompts, measure CTR uplift.',
              embedding_vector=[0.001] * 384,
              namespace='self-improve',
              actor='github-actions-daily',
              agent_id=agent_id,
          )
          duration_ms = int((time.time() - start) * 1000)
          print(f'Self-improve complete: {result.status} in {duration_ms}ms via {result.route_tier}')
          "

      - name: Push results to Redis
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          python scripts/push_cycles_to_redis.py
