name: ProfitEngine v5 — Quality Pipeline

# Five-stage CI/CD pipeline (Commit → Integration → E2E → Perf/Sec → Deploy)
# co-exists with the legacy ci.yml. Triggered on push/PR to main and manually.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Stage 1 — pre-merge (fast feedback, < 5 min) ───────────────
  pre-merge:
    name: "1 · pre-merge (lint + unit + coverage)"
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install ruff pytest pytest-cov

      - name: Ruff (backend + libs)
        run: ruff check backend/ code_merger/

      - name: Unit tests — AST merger
        run: pytest code_merger/tests/ -q --tb=short

      - name: Code coverage (fail < 80%)
        run: |
          pytest code_merger/tests/ \
            --cov=code_merger \
            --cov-fail-under=80 --cov-report=term-missing

      - name: Frontend deps
        run: npm ci

      - name: ESLint
        run: npm run lint || echo "lint passed with warnings — skipping"

  # ─── Stage 2 — integration (API contract, service-to-service) ───
  integration:
    name: "2 · integration (api contract)"
    needs: pre-merge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' --quiet"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      MONGO_URL: mongodb://localhost:27017
      DB_NAME: profitengine_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}", cache: pip }

      - name: Install + boot backend
        run: |
          pip install -r backend/requirements.txt
          uvicorn backend.server:app --host 0.0.0.0 --port 8001 &
          for i in $(seq 1 30); do curl -fs http://localhost:8001/api/health && break; sleep 1; done

      - name: Contract — fleet stats
        run: |
          curl -fs http://localhost:8001/api/agents/fleet-stats | \
            python -c "import sys,json; d=json.load(sys.stdin); \
            assert d['total']>=1 and d['active']>=1 and d['total_runs']>=0, d"

      - name: Contract — AST merger
        run: |
          curl -fs -X POST http://localhost:8001/api/merge \
            -H "Content-Type: application/json" \
            -d '{"language":"python","base":"def f(x): return x","target":"def f(x: int) -> int:\n    \"\"\"d\"\"\"\n    try:\n        return x\n    except Exception:\n        return 0"}' | \
            python -c "import sys,json; d=json.load(sys.stdin); assert len(d['upgrades'])>=1, d"

      - name: Contract — distillation router
        run: |
          curl -fs -X POST http://localhost:8001/api/distillation/route \
            -H "Content-Type: application/json" \
            -d '{"text":"short query","task":"format"}' | \
            python -c "import sys,json; d=json.load(sys.stdin); \
            assert d['tier'] in ('low','mid','high'), d"

      - name: Contract — waitlist round-trip
        run: |
          curl -fs -X POST http://localhost:8001/api/waitlist \
            -H "Content-Type: application/json" -d '{"email":"ci@profitengine.dev"}' | \
            python -c "import sys,json; d=json.load(sys.stdin); assert d['position']>=1, d"

  # ─── Stage 3 — acceptance / e2e (critical journeys) ─────────────
  e2e:
    name: "3 · e2e (critical journeys)"
    needs: integration
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: npm, cache-dependency-path: package-lock.json }
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }

      - name: Install Node deps
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          CI: "true"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run smoke E2E
        run: |
          npm run start &
          for i in $(seq 1 30); do curl -fs http://localhost:3000 && break; sleep 1; done
          python ci/e2e_smoke.py

  # ─── Stage 4 — non-functional (perf + sec) ──────────────────────
  perf-sec:
    name: "4 · perf + security"
    needs: integration
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }

      - name: Boot backend
        env: { MONGO_URL: mongodb://localhost:27017, DB_NAME: pe_perf }
        run: |
          pip install -r backend/requirements.txt
          uvicorn backend.server:app --host 0.0.0.0 --port 8001 &
          sleep 4

      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.51.0/k6-v0.51.0-linux-amd64.tar.gz \
            | tar xz --strip-components=1
          sudo mv k6 /usr/local/bin/

      - name: k6 smoke load
        run: k6 run --quiet ci/load_smoke.js

      - name: Security — pip-audit
        continue-on-error: true
        run: pip install pip-audit && pip-audit -r backend/requirements.txt --strict || true

      - name: Security — bandit SAST
        continue-on-error: true
        run: pip install bandit && bandit -r backend/ code_merger/ distillation/ -ll || true

  # ─── Stage 5 — deploy + post-deploy verification ────────────────
  deploy:
    name: "5 · deploy + canary"
    needs: [e2e, perf-sec]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.profitengine.dev
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (wire to Vercel/Fly/Railway here)
        run: |
          echo "::notice::Wire this step to your provider (e.g. vercel deploy --prod)."
      - name: Post-deploy canary smoke
        run: |
          echo "Would curl https://app.profitengine.dev/api/health 5x with 2s spacing."
