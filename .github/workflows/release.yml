name: Release

# Triggered by pushing a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  # Image names follow: ghcr.io/<owner>/<repo>-web  and  ghcr.io/<owner>/<repo>-runtime
  IMAGE_WEB:     ghcr.io/${{ github.repository }}-web
  IMAGE_RUNTIME: ghcr.io/${{ github.repository }}-runtime
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Run the full CI suite before releasing ──────────────────────────────
  ci:
    name: CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: pip install -r requirements.txt
      - run: npm run ci:all

  # ── 2. Build and publish Docker images to GHCR ────────────────────────────
  publish:
    name: Build & push images
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Extract semver tag (e.g. v0.2.0 → 0.2.0) and short SHA for image labels
      - name: Parse version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"           # e.g. v0.2.0
          SEMVER="${TAG#v}"                  # strip leading 'v'
          SHA="${GITHUB_SHA::7}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"       >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── web image ───────────────────────────────────────────────────────
      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.version.outputs.semver }}
            ${{ env.IMAGE_WEB }}:latest
          labels: |
            org.opencontainers.image.title=ProfitEngine Web
            org.opencontainers.image.version=${{ steps.version.outputs.semver }}
            org.opencontainers.image.revision=${{ steps.version.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      # ── runtime image ────────────────────────────────────────────────────
      - name: Build & push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.runtime
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_RUNTIME }}:${{ steps.version.outputs.semver }}
            ${{ env.IMAGE_RUNTIME }}:latest
          labels: |
            org.opencontainers.image.title=ProfitEngine Runtime
            org.opencontainers.image.version=${{ steps.version.outputs.semver }}
            org.opencontainers.image.revision=${{ steps.version.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Create a GitHub Release with changelog ─────────────────────────────
  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for commit range

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "$PREV_TAG" ]]; then
            LOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges)
          else
            LOG=$(git log HEAD --oneline --no-merges | head -20)
          fi
          # Write to a file to preserve newlines
          {
            echo "## What's changed"
            echo ""
            echo "$LOG"
            echo ""
            echo "## Docker images"
            echo ""
            echo "- \`${{ env.IMAGE_WEB }}:${{ steps.version.outputs.semver }}\`"
            echo "- \`${{ env.IMAGE_RUNTIME }}:${{ steps.version.outputs.semver }}\`"
            echo ""
            echo "## Quick deploy"
            echo '```bash'
            echo "git clone https://github.com/${{ github.repository }}.git"
            echo "cd $(basename ${{ github.repository }})"
            echo "cp .env.example .env  # fill in all required values"
            echo "bash scripts/deploy.sh"
            echo '```'
          } > RELEASE_NOTES.md
          echo "semver=${{ steps.version.outputs.semver }}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       ProfitEngine v${{ steps.version.outputs.semver }}
          body_path:  RELEASE_NOTES.md
          draft:      false
          prerelease: ${{ contains(github.ref_name, '-') }}
