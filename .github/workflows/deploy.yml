name: Deploy to OCI Server

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      fresh_build:
        description: 'Rebuild images without cache'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  deploy:
    name: Deploy to 129.146.167.73
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          # SERVER_SSH_KEY is the base64-encoded OpenSSH private key (ED25519)
          printf '%s' "${{ secrets.SERVER_SSH_KEY }}" | tr -d ' \r\n' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Validate the key loaded correctly
          ssh-keygen -l -f ~/.ssh/deploy_key || { echo "ERROR: deploy key is invalid — re-set SERVER_SSH_KEY secret"; exit 1; }
          ssh-keyscan -H 129.146.167.73 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connectivity
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            opc@129.146.167.73 \
            "echo SSH_OK && hostname && df -h / | tail -1"

      - name: Upload deploy env
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_CONTENT_TOKEN: ${{ secrets.CONTENT_REPO_TOKEN }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          AFFILIATE_LINKS: ${{ secrets.AFFILIATE_LINKS }}
          AMAZON_PARTNER_TAG: ${{ secrets.AMAZON_PARTNER_TAG }}
          HASHNODE_API_KEY: ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUB_ID: ${{ secrets.HASHNODE_PUB_ID }}
          MEDIUM_API_KEY: ${{ secrets.MEDIUM_API_KEY }}
          MEDIUM_AUTHOR_ID: ${{ secrets.MEDIUM_AUTHOR_ID }}
          # v5 backend secrets — add these in GitHub → Settings → Secrets → Actions
          MONGO_URL: ${{ secrets.MONGO_URL }}
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # daily digest
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Write secrets to a temp file and scp it to the server
          cat > /tmp/deploy_env.sh <<EOF
          export ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}"
          export GROQ_API_KEY="${GROQ_API_KEY}"
          export GEMINI_API_KEY="${GEMINI_API_KEY}"
          export GITHUB_CONTENT_TOKEN="${GITHUB_CONTENT_TOKEN}"
          export GMAIL_APP_PASSWORD="${GMAIL_APP_PASSWORD}"
          export DEVTO_API_KEY="${DEVTO_API_KEY}"
          export AFFILIATE_LINKS='${AFFILIATE_LINKS}'
          export AMAZON_PARTNER_TAG="${AMAZON_PARTNER_TAG}"
          export HASHNODE_API_KEY="${HASHNODE_API_KEY}"
          export HASHNODE_PUB_ID="${HASHNODE_PUB_ID}"
          export MEDIUM_API_KEY="${MEDIUM_API_KEY}"
          export MEDIUM_AUTHOR_ID="${MEDIUM_AUTHOR_ID}"
          export MONGO_URL="${MONGO_URL}"
          export STRIPE_API_KEY="${STRIPE_API_KEY}"
          export STRIPE_WEBHOOK_SECRET="${STRIPE_WEBHOOK_SECRET}"
          export OPENAI_API_KEY="${OPENAI_API_KEY}"
          export OPENROUTER_API_KEY="${OPENROUTER_API_KEY}"
          export DEEPSEEK_API_KEY="${DEEPSEEK_API_KEY}"
          export TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}"
          export TELEGRAM_CHAT_ID="${TELEGRAM_CHAT_ID}"
          export RESEND_API_KEY="${RESEND_API_KEY}"
          EOF
          echo "Uploading deploy env (${#GROQ_API_KEY} char GROQ key, ${#GEMINI_API_KEY} char Gemini key, ${#MONGO_URL} char Mongo URL)"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/deploy_env.sh opc@129.146.167.73:/tmp/deploy_env.sh
          echo "SCP complete"

      - name: Deploy via SSH
        run: |
          # Clone repo on first deploy if not present, then bootstrap
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=15 \
            opc@129.146.167.73 \
            "set -e
             REPO_DIR=/home/opc/profitenginev5
             if [ ! -d \$REPO_DIR ]; then
               git clone https://github.com/quantam101/profitenginev5.git \$REPO_DIR
             fi
             cd \$REPO_DIR
             git fetch origin && git checkout main && git reset --hard origin/main
             source /tmp/deploy_env.sh
             REPO_DIR=\$REPO_DIR bash scripts/bootstrap-server.sh 2>&1 | tail -100
             rm -f /tmp/deploy_env.sh"

      - name: Start TokenForge backend
        continue-on-error: true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          # Build tf.env locally then scp — avoids heredoc-at-col-0 YAML parse error
          JWT="${JWT_SECRET:-changeme_set_jwt_secret_in_profitenginev5_secrets}"
          {
            echo "MONGO_URL=mongodb://mongo:27017"
            echo "DB_NAME=tokenforge"
            echo "JWT_SECRET=${JWT}"
            echo "GROQ_API_KEY=${GROQ_API_KEY}"
            echo "GOOGLE_API_KEY=${GEMINI_API_KEY}"
            echo "CORS_ORIGINS=https://forge.alreadyherellc.com,http://localhost:3000"
            echo "LLM_POLLINATIONS_FALLBACK=true"
          } > /tmp/tf.env
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/tf.env opc@129.146.167.73:/tmp/tf.env
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=10 \
            opc@129.146.167.73 \
            "set -e
             TF=/opt/tokenforge
             if [ ! -d \$TF/.git ]; then
               sudo mkdir -p \$TF && sudo chown opc:opc \$TF
               git clone https://github.com/quantam101/Token.git \$TF
             else
               cd \$TF && git pull origin main || true
             fi
             mkdir -p \$TF/backend
             sudo cp /tmp/tf.env \$TF/backend/.env
             cd \$TF
             sudo docker compose up -d --build --remove-orphans backend mongo 2>&1 | tail -20
             echo TokenForge backend started"

      - name: Verify health
        run: |
          sleep 15
          # Primary: probe FastAPI backend via SSH (doesn't need DNS/Caddy/TLS)
          STATUS=$(ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            opc@129.146.167.73 \
            "cd /home/opc/profitenginev5 && \
             docker compose exec -T backend python3 -c \
               'import urllib.request,json,sys; r=urllib.request.urlopen(\"http://localhost:8001/api/health\",timeout=5); d=json.loads(r.read()); print(\"ok\" if d.get(\"ok\") or d.get(\"status\")==\"ok\" else \"fail\")' \
             2>/dev/null || echo unreachable" \
            2>/dev/null || echo unreachable)
          echo "Backend health: $STATUS"
          # Secondary: Caddy on port 80 (works once DNS + firewall are open)
          CADDY=$(curl -sf --max-time 10 -L \
            -H "Host: profitengine.alreadyherellc.com" \
            http://129.146.167.73/api/health \
            2>/dev/null && echo "caddy-ok" || echo "caddy-unreachable")
          echo "Caddy health: $CADDY"
          if [[ "$STATUS" == "fail" ]]; then
            echo "::warning::Backend health check returned ok=false — check docker compose logs backend"
            exit 1
          fi
          if [[ "$STATUS" == "unreachable" ]]; then
            echo "::warning::Backend unreachable via docker exec — containers may still be starting up"
          fi
