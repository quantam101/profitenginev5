name: Register First Client

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Client email address'
        required: true
        default: 'dispatch@alreadyherellc.com'
      role:
        description: 'Client role'
        required: false
        default: 'client'
      use_case:
        description: 'Use case description'
        required: false
        default: 'Already Here LLC - field service dispatch and content publishing, Cohort 1'

jobs:
  register:
    name: Register client on waitlist
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.SERVER_SSH_KEY }}" | tr -d ' \r\n' | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 129.146.167.73 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build JSON payload
        env:
          CLIENT_EMAIL: ${{ github.event.inputs.email }}
          CLIENT_ROLE: ${{ github.event.inputs.role }}
          CLIENT_USE_CASE: ${{ github.event.inputs.use_case }}
        run: |
          python3 -c "
          import json, os
          print(json.dumps({
            'email':    os.environ['CLIENT_EMAIL'],
            'role':     os.environ.get('CLIENT_ROLE', 'client'),
            'use_case': os.environ.get('CLIENT_USE_CASE', ''),
          }))
          " > /tmp/payload.json
          echo "Payload: $(cat /tmp/payload.json)"

      - name: Register client via backend container
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/payload.json opc@129.146.167.73:/tmp/waitlist_payload.json

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            opc@129.146.167.73 \
            "cd /home/opc/profitenginev5 && \
             cat /tmp/waitlist_payload.json | \
             docker compose exec -T backend \
               curl -sf -X POST http://localhost:8001/api/waitlist \
               -H 'Content-Type: application/json' --data @- && \
             rm -f /tmp/waitlist_payload.json"
