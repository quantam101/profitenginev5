name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "devin/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHONUNBUFFERED: "1"

jobs:
  # ── Stage 1: pre-merge — lint + unit + types ───────────────────
  pre_merge:
    name: "Stage 1 — pre-merge (lint, unit, types)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install ruff
      - name: Install Node deps
        run: npm ci
      - name: Ruff lint
        run: ruff check backend code_merger
      - name: npm run ci:all
        run: npm run ci:all
        env:
          CI: "true"
          EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY || 'stub-emergent-ci-key' }}
      - name: Unit tests (code_merger)
        run: python -m pytest code_merger/tests/ -v

  # ── Stage 2: integration — FastAPI + Mongo ─────────────────────
  integration:
    name: "Stage 2 — integration (API + Mongo)"
    runs-on: ubuntu-latest
    needs: pre_merge
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python deps
        run: pip install -r backend/requirements.txt
      - name: Run contract tests
        env:
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "profitengine_ci"
          EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY || 'sk-emergent-ci-stub' }}
        run: python -m pytest backend/tests/test_backend_api.py backend/tests/test_distillation.py -v

  # ── Stage 3: e2e — Playwright against running stack ────────────
  e2e:
    name: "Stage 3 — e2e (Playwright)"
    runs-on: ubuntu-latest
    needs: integration
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          npm ci
      - name: Boot backend
        env:
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "profitengine_ci"
          EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY || 'sk-emergent-ci-stub' }}
        run: |
          cd /home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}
          nohup uvicorn backend.server:app --host 0.0.0.0 --port 8001 > backend.log 2>&1 &
          for i in {1..30}; do curl -fs http://localhost:8001/api/health && break; sleep 1; done
      - name: Playwright smoke (headless)
        run: |
          npx --yes playwright install --with-deps chromium
          node -e "(async()=>{const {chromium}=require('playwright');const b=await chromium.launch();const p=await b.newPage();const r=await p.goto('http://localhost:8001/api/health');if(r.status()!==200)throw new Error('health failed');console.log('e2e ok');await b.close();})()"

  # ── Stage 4: performance / smoke (k6) ──────────────────────────
  performance:
    name: "Stage 4 — performance (k6)"
    runs-on: ubuntu-latest
    needs: integration
    services:
      mongo:
        image: mongo:7
        ports: ["27017:27017"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Boot backend
        env:
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "profitengine_ci"
          EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY || 'sk-emergent-ci-stub' }}
        run: |
          nohup uvicorn backend.server:app --host 0.0.0.0 --port 8001 > backend.log 2>&1 &
          for i in {1..30}; do curl -fs http://localhost:8001/api/health && break; sleep 1; done
      - name: Install k6
        run: |
          sudo gpg -k && sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install -y k6
      - name: Run k6 smoke
        env:
          BASE_URL: "http://localhost:8001"
        run: k6 run ci/load_smoke.js

  # ── Stage 5: build + readiness gate ────────────────────────────
  deployment_gate:
    name: "Stage 5 — deployment gate (yarn verify)"
    runs-on: ubuntu-latest
    needs: [e2e, performance]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Frontend deployment gate
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build
      - name: Done
        run: echo "deployment gate passed — lints, types, and production build succeeded."

  readiness:
    name: "Stage 6 — readiness gate"
    runs-on: ubuntu-latest
    needs: [deployment_gate]
    steps:
      - uses: actions/checkout@v4
      - run: echo "All gates passed. Ready to deploy."
