server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path returns the React shell
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — cache forever (hashed by CRA)
    location /static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # OG image
    location = /og.png {
        add_header Cache-Control "public, max-age=86400";
    }
}
