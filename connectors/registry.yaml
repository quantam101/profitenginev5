connectors:
  # ── Local / always-free ──────────────────────────────────────────────────
  local_files:
    state: free_core
    enabled: true
    permissions: [read_workspace, write_drafts]

  ollama_local:
    state: free_core
    enabled: true
    permissions: [local_inference]

  playwright_local:
    state: free_core
    enabled: true
    permissions: [browser_research]

  n8n_local:
    state: free_core
    enabled: true
    permissions: [run_local_workflow]

  # ── Free external inference ──────────────────────────────────────────────
  groq_api:
    state: free_external
    enabled: true
    permissions: [remote_inference]

  gemini_api:
    state: free_external
    enabled: true
    permissions: [remote_inference]

  # ── Free external publishing ─────────────────────────────────────────────
  devto_api:
    state: free_external
    enabled: true
    permissions: [create_article, read_articles]

  github_api:
    state: free_external
    enabled: true
    permissions: [read_repo, write_file]

  gmail_smtp:
    state: free_external
    enabled: true
    permissions: [send_email]

  # ── Read-only external (free, no write) ──────────────────────────────────
  github_read:
    state: free_external
    enabled: false
    permissions: [read_repo]

  # ── Requires explicit approval ────────────────────────────────────────────
  github_write:
    state: forbidden_without_approval
    enabled: false
    permissions: [create_branch, open_pr]

  stripe:
    state: forbidden_without_approval
    enabled: false
    permissions: []

  # ── Optional paid (disabled) ──────────────────────────────────────────────
  openai_api:
    state: optional_paid_disabled
    enabled: false
    permissions: []

  anthropic_api:
    state: optional_paid_disabled
    enabled: false
    permissions: []

  perplexity_api:
    state: optional_paid_disabled
    enabled: false
    permissions: []

  devin:
    state: optional_paid_disabled
    enabled: false
    permissions: []

  manus:
    state: optional_paid_disabled
    enabled: false
    permissions: []
