[tool.ruff]
target-version = "py311"
extend-exclude = [
    # AST-merger output candidates — not yet wired into the active runtime
    "backend/services/content_generation_service.py",
    "backend/services/llm_runner.py",
    "**/*.bak",
    "**/.bak",
    "runtime/",
    "frontend/",
    "node_modules/",
    "code_merger/demo_output/",
]

[tool.ruff.lint]
# E/F/W — standard style + pyflakes
# S     — flake8-bandit (Bandit) security rules: hardcoded passwords, exec/eval,
#          insecure hashes, shell injection, XML vulnerabilities, etc.
#          These replace the broad string-grep markers (API_KEY=, ANTHROPIC_API_KEY)
#          that used to live in the custom secret scanner.
select = ["E", "F", "W", "S"]
ignore = [
    "E501",   # line length handled by formatter
    "S101",   # use of assert — fine in tests
    "S603",   # subprocess call — intentional in scripts/
    "S607",   # partial executable path — intentional in scripts/
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S"]       # test files may use hardcoded fixtures
"scripts/**" = ["S603", "S607", "S605"]  # scripts intentionally call subprocesses
