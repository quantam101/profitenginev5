[tool.ruff]
target-version = "py311"
extend-exclude = [
    # AST-merger output candidates — not yet wired into the active runtime
    "backend/services/content_generation_service.py",
    "backend/services/llm_runner.py",
    "**/*.bak",
    "**/.bak",
    "runtime/",
    "frontend/",
    "node_modules/",
    "code_merger/demo_output/",
]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]  # line length handled by formatter
