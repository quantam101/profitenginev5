services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - runtime
      - uptime-kuma

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      NEXT_PUBLIC_COMMAND_CENTER_URL: ${COMMAND_CENTER_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    expose:
      - "3000"
    depends_on:
      - runtime

  runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    volumes:
      - gmaos_data:/data
    command: ["uvicorn", "runtime.api:app", "--host", "0.0.0.0", "--port", "8080"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:2.19.5
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_HOST: ${N8N_HOST:-n8n.${SITE_DOMAIN}}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_PUBLIC_URL:-https://n8n.${SITE_DOMAIN}}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:?N8N_BASIC_AUTH_USER is required}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?N8N_BASIC_AUTH_PASSWORD is required}
    volumes:
      - n8n_data:/home/node/.n8n

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - uptime_data:/app/data

  # Local inference — runs on OCI A1 ARM (4 OCPUs / 24 GB RAM, CPU-only).
  # After first `docker compose up -d`, pull a model once:
  #   docker compose exec ollama ollama pull llama3.1:8b
  # Recommended models by use-case:
  #   llama3.1:8b  — best all-round (default)
  #   qwen2.5:7b   — SEO / multilingual content
  #   phi3.5:3.8b  — fastest for short structured tasks
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    # Profile "local-llm": not started on regular deploys (saves 10+ GB disk).
    # To start manually: docker compose --profile local-llm up -d ollama
    # Then pull a model: docker compose exec ollama ollama pull llama3.1:8b
    profiles:
      - local-llm
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  caddy_data:
  caddy_config:
  gmaos_data:
  postgres_data:
  n8n_data:
  uptime_data:
  ollama_data:
