services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - runtime
      - uptime-kuma

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      NEXT_PUBLIC_COMMAND_CENTER_URL: ${COMMAND_CENTER_URL}
    expose:
      - "3000"
    depends_on:
      - runtime

  runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    volumes:
      - gmaos_data:/data
    command: ["python", "-m", "runtime.sovereign_core"]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gmaos}
      POSTGRES_USER: ${POSTGRES_USER:-gmaos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-server-side}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    expose:
      - "5678"
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_HOST: ${N8N_HOST:-n8n.alreadyherellc.com}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_PUBLIC_URL:-https://n8n.alreadyherellc.com}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-change-me-server-side}
    volumes:
      - n8n_data:/home/node/.n8n

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - uptime_data:/app/data

volumes:
  caddy_data:
  caddy_config:
  gmaos_data:
  postgres_data:
  n8n_data:
  uptime_data:
